<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>券包 · 品牌组件 — 预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html { background: #2c2c2e; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #2c2c2e;
  margin: 0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  flex-direction: row;
  justify-content: stretch;
  gap: 8px;
  background: rgba(44, 44, 46, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  padding: 10px 12px;
}
.nav a {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #d1d1d6;
  text-decoration: none;
  padding: 8px 4px;
  border-radius: 8px;
  line-height: 1.3;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
}
.nav a:hover,
.nav a:active {
  background: rgba(255, 255, 255, 0.08);
}

/* 左 · 中 · 右 三列 */
.tri {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  width: max(100%, 900px);
  margin: 0 auto;
  min-height: calc(100vh - 52px);
}

.col {
  flex: 1 1 280px;
  min-width: 280px;
  scroll-margin-top: 52px;
}

/* 左列：中间区域滚动，最底一张切图（导航）固定在左栏「屏幕」底边，与 page1 一致 */
.col-main {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
  position: relative;
}
.main-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  line-height: 0;
  /* 与 page1_tabbar 1500×368 同比例，为底栏留出滚动区，避免内容被盖住 */
  padding-bottom: calc(100% * 368 / 1500);
}
.main-scroll .slice {
  display: block;
  width: 100%;
  height: auto;
  vertical-align: top;
}
.main-tabbar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 2;
  line-height: 0;
  background: #2c2c2e;
}
.main-tabbar img {
  display: block;
  width: 100%;
  height: auto;
  vertical-align: top;
}

.sec-title {
  font-size: 11px;
  color: #8e8e93;
  padding: 0 0 8px;
  letter-spacing: 0.02em;
  text-align: center;
}

.slice {
  display: block;
  width: 100%;
  height: auto;
  vertical-align: top;
  user-select: none;
  -webkit-user-drag: none;
  border-radius: 0;
}

@media (max-width: 900px) {
  body {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
</head>
<body>

<nav class="nav" aria-label="跳转至列">
  <a href="#" data-col="0" role="button">左 · 主会场</a>
  <a href="#" data-col="1" role="button">中 · 券包</a>
  <a href="#" data-col="2" role="button">右 · 品牌</a>
</nav>

<div class="tri" id="tri">
  <!-- 主会场：page1_content + page1_tabbar（底栏吸底） -->
  <section class="col col-main" id="sec-main">
    <p class="sec-title">主会场 · Figma 0:2</p>
    <div class="main-scroll" id="main-scroll-box" role="region" aria-label="主会场（可滚动主区域）">
      <img class="slice" src="assets/page1_content.png" alt="主会场" width="1500" height="5028" decoding="async" fetchpriority="high">
    </div>
    <div class="main-tabbar">
      <img src="assets/page1_tabbar.png" alt="底部导航" width="1500" height="368" decoding="async">
    </div>
  </section>
  <section class="col" id="sec-coupon">
    <p class="sec-title">券包状态 · 0:57</p>
    <img class="slice" src="assets/frame_0_57.png" alt="券包状态" width="1500" height="2864" decoding="async">
  </section>
  <section class="col" id="sec-brand">
    <p class="sec-title">品牌推荐 · 0:73</p>
    <img class="slice" src="assets/frame_0_73.png" alt="品牌推荐" width="1500" height="940" decoding="async">
  </section>
</div>

<script>
(function () {
  document.querySelectorAll('.nav a[data-col]').forEach(function (el) {
    el.addEventListener('click', function (e) {
      e.preventDefault();
      var i = parseInt(el.getAttribute('data-col'), 10);
      var cols = document.querySelectorAll('.tri .col');
      if (cols[i]) {
        cols[i].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    });
  });

  function syncMainColumnHeight() {
    var mid = document.getElementById('sec-coupon');
    var main = document.getElementById('sec-main');
    if (!mid || !main) return;
    main.style.height = mid.offsetHeight + 'px';
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', syncMainColumnHeight);
  } else {
    syncMainColumnHeight();
  }
  window.addEventListener('resize', syncMainColumnHeight);
  window.addEventListener('load', syncMainColumnHeight);

  var midEl = document.getElementById('sec-coupon');
  if (midEl && typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncMainColumnHeight).observe(midEl);
  }

  document.querySelectorAll('#sec-coupon img, #sec-brand img').forEach(function (img) {
    if (!img.complete) img.addEventListener('load', syncMainColumnHeight);
  });

  document.querySelectorAll('#sec-main .slice, #sec-main .main-tabbar img').forEach(function (img) {
    if (!img.complete) img.addEventListener('load', syncMainColumnHeight);
  });
})();
</script>

</body>
</html>
